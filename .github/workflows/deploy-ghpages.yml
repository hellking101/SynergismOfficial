name: Deploy to GitHub Pages
on:
  push:
    branches: master # Ensure your main branch is actually named 'master'

permissions:
  contents: write # Required for pushing to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Updated to v4

      - name: Use Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: lts/*
          cache: 'npm' # Speeds up future builds

      - name: Install dependencies
        run: npm install

      - name: Build Game
        run: |
          node ./scripts/update-last-updated.js
          npm run build:esbuild

      - name: Prepare Files
        run: |
          mkdir -p targetdir
          # Moves only the necessary playable files to the target directory
          mv dist Pictures translations index.html Synergism.css favicon.ico targetdir/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4 # Updated to v4
        with:
          branch: gh-pages # The branch the action will deploy to
          folder: targetdir # The folder the action should deploy
